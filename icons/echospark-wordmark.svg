<svg width="280" height="80" viewBox="0 0 280 80" fill="none" xmlns="http://www.w3.org/2000/svg">

    <!-- Background -->
    <rect width="280" height="80" fill="#060d1a"/>

    <!-- Logo mark: 40×40 viewBox scaled to 64×64, placed at (8, 8) -->
    <g transform="translate(8, 8) scale(1.6)">
        <!-- Hexagon outline -->
        <path d="M20 5L35 12V28L20 35L5 28V12L20 5Z"
              stroke="url(#wm-grad)" stroke-width="2" fill="none" stroke-linejoin="round"/>
        <!-- Cardinal points -->
        <path d="M20 9L22 20L18 20Z"  fill="url(#wm-grad)"/>
        <path d="M20 31L22 20L18 20Z" fill="url(#wm-grad)"/>
        <path d="M31 20L20 18L20 22Z" fill="url(#wm-grad)"/>
        <path d="M9 20L20 18L20 22Z"  fill="url(#wm-grad)"/>
        <!-- Intercardinal points -->
        <path d="M27 13L21.5 21.5L18.5 18.5Z" fill="url(#wm-grad)"/>
        <path d="M27 27L21.5 18.5L18.5 21.5Z" fill="url(#wm-grad)"/>
        <path d="M13 27L18.5 18.5L21.5 21.5Z" fill="url(#wm-grad)"/>
        <path d="M13 13L18.5 21.5L21.5 18.5Z" fill="url(#wm-grad)"/>
        <!-- Center circle -->
        <circle cx="20" cy="20" r="1.5" fill="url(#wm-grad)"/>
    </g>

    <!-- "EchoSpark" wordmark text -->
    <text x="84" y="50"
          font-family="Ubuntu, sans-serif"
          font-size="30"
          font-weight="700"
          letter-spacing="-0.5"
          fill="url(#text-grad)">EchoSpark</text>

    <defs>
        <!-- Logo gradient: top-left → bottom-right -->
        <linearGradient id="wm-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#2563eb"/>
            <stop offset="100%" stop-color="#1e40af"/>
        </linearGradient>
        <!-- Text gradient: left → right -->
        <linearGradient id="text-grad" x1="84" y1="0" x2="280" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#2563eb"/>
            <stop offset="100%" stop-color="#1e40af"/>
        </linearGradient>
    </defs>
</svg>
